{% extends "./base.html" %}
{% block title %}
{{ titulo }}
{% endblock %}

{% block body %}
<section class="situ-hero text-center mb-4">
    <p class="hero-kicker">Formulario</p>
    <h1 class="hero-title">{{ titulo }}</h1>
    <p class="hero-subtitle">Completa la informacion y guarda los cambios.</p>
</section>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card situ-card">
            <div class="card-body p-4 p-lg-5">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap form-actions">
                        <a href="{% url 'pasajeros' %}" class="btn btn-primary form-cancel-btn">Cancelar</a>
                        <button type="submit" class="btn btn-warning form-submit-btn">{{ texto_boton }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
