{% extends "./base.html" %}
{% block title %}
    Pasaje
{% endblock %}

{% block body %}
<section class="situ-hero text-center mb-4">
    <p class="hero-kicker">Edicion</p>
    <h1 class="hero-title">Actualizar pasajero</h1>
    <p class="hero-subtitle">Modifica los datos y guarda los cambios.</p>
</section>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card situ-card">
            <div class="card-body">
                <form action="" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap">
                        <a href="{% url 'pasajeros' %}" class="btn btn-primary">Cancelar</a>
                        <button type="submit" class="btn btn-warning">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
